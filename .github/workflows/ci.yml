name: CI - Quality Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Service MySQL pour les tests d'intégration
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: assurance_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. Checkout du code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configuration JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Cache des dépendances Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. Compilation du projet
      - name: Compile project
        run: mvn clean compile

      # 5. Vérification Checkstyle
      - name: Run Checkstyle
        run: mvn checkstyle:check

      # 6. Génération du rapport Checkstyle 
      - name: Generate Checkstyle report
        run: mvn checkstyle:checkstyle

      # 7. Exécution des tests avec JaCoCo
      - name: Run tests with JaCoCo
        run: mvn clean test jacoco:report

      # 8. Génération du rapport Surefire (tests)
      - name: Generate Surefire report
        run: mvn surefire-report:report

      # 9. Upload du rapport JaCoCo
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      # 10. Upload du rapport Checkstyle (CORRIGÉ - path multiple + continue-on-error)
      - name: Upload Checkstyle report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: |
            target/checkstyle-result.xml
            target/site/checkstyle.html
          retention-days: 7
          continue-on-error: true  # Évite l'échec si le fichier n'existe pas

      # 11. Upload des résultats des tests
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      # 12. Packaging de l'application
      - name: Build package
        run: mvn package -DskipTests

      # 13. Upload du JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: assurance-examen-jar
          path: target/*.jar
          retention-days: 7

  # Job pour vérifier la qualité (seuils)
  quality-gate:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Télécharger le rapport JaCoCo depuis l'artefact
      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Vérifier le seuil de couverture (70%)
      - name: Check coverage threshold
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            COVERAGE=$(grep -oP 'ctr2">\K[0-9]+' target/site/jacoco/index.html | head -1)
            echo "Coverage: ${COVERAGE:-0}%"
            if [ "${COVERAGE:-0}" -lt 70 ]; then
              echo "Coverage ${COVERAGE:-0}% is below 70% threshold"
              exit 1
            else
              echo "Coverage ${COVERAGE:-0}% is above 70% threshold"
            fi
          else
            echo "JaCoCo report not found, skipping coverage check"
          fi
